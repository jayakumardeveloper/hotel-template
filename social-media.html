      /* Floating ingredients animation */
      .falling-leaves {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }
      .falling-leaves .leaf {
        position: absolute;
        opacity: 0.8;
        filter: blur(1px);
        object-fit: contain;
      }
      .anim-leaf-1 {
        top: -10%;
        left: 10%;
        animation: diagonalFall 12s linear infinite;
      }
      .anim-leaf-2 {
        top: -10%;
        left: 30%;
        animation: diagonalFall 15s linear infinite 2s;
      }
      .anim-leaf-3 {
        top: -10%;
        left: 60%;
        animation: diagonalFall 10s linear infinite 5s;
        filter: blur(2px);
      }
      .anim-leaf-4 {
        top: -10%;
        left: 80%;
        animation: diagonalFall 18s linear infinite 1s;
      }
      .anim-leaf-5 {
        top: -10%;
        left: 90%;
        animation: diagonalFall 14s linear infinite 4s;
      }
      .anim-leaf-6 {
        top: -10%;
        left: 45%;
        animation: diagonalFall 16s linear infinite 3s;
        filter: blur(1.5px);
      }
      @keyframes diagonalFall {
        0% {
          transform: translate(0, 0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.6;
        }
        90% {
          opacity: 0.6;
        }
        100% {
          transform: translate(-300px, 120vh) rotate(360deg);
          opacity: 0;
        }
      }
      img.leaf {

      }
      @media (prefers-reduced-motion: reduce) {

      /* PDF Modal Styling */

        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.3s ease,
          visibility 0.3s ease;
      }
      .pdf-modal.active {
        opacity: 1;
        visibility: visible;
      }
      .pdf-modal-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(5px);
      }
      .pdf-modal-container {

        z-index: 10000;
        width: 90%;
        max-width: 900px;
        height: 85vh;

        border: 2px solid #ffbe0e;
        border-radius: 12px;

        flex-direction: column;
        overflow: hidden;
        transform: scale(0.9);
        transition: transform 0.3s ease;
      }
      .pdf-modal.active .pdf-modal-container {

      }
      .pdf-modal-header {

        align-items: center;

    <!-- PDF Modal Script -->
    <script>
      (function () {
        'use strict';
        try {
          var openBtn = document.getElementById('openMenuModal');
          var modal = document.getElementById('pdfModal');
          var closeBtn = document.getElementById('closePdfModal');
          var overlay = document.getElementById('pdfModalOverlay');
          var iframe = document.getElementById('pdfIframe');
          var pdfPath = 'assets/img/Menu-list.pdf';

          if (!openBtn || !modal || !closeBtn || !overlay || !iframe) {
            return;
          }

          function openModal(e) {
            if (e) e.preventDefault();
            if (iframe.getAttribute('src') !== pdfPath) {
              iframe.setAttribute('src', pdfPath);
            }
            modal.classList.add('active');
            modal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
          }

          function closeModal() {
            modal.classList.remove('active');
            modal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
          }

          openBtn.addEventListener('click', openModal);
          closeBtn.addEventListener('click', closeModal);
          overlay.addEventListener('click', closeModal);

          document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
              closeModal();
            }
          });
        } catch (err) {
          console.error('Menu modal initialization failed:', err);
        }
      })();
    </script>
